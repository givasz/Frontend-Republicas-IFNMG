<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Anuncie sua Moradia</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
    <div class="caixa">
        <h2 id="titulo-formulario">Login</h2>
        <form id="form-autenticacao">
            <input type="text" id="nome" placeholder="Nome" style="display: none;">
            <input type="email" id="email" placeholder="Email" required>
            <div class="campo-senha">
                <input type="password" id="senha" placeholder="Senha" required>
                <i id="icone-senha" class="bi bi-eye-fill" onclick="mostrarSenha()"></i>
            </div>
            <button type="submit">Entrar</button>
        </form>
        <button class="alternar" id="botao-alternar">Criar conta</button>
        <button onclick="window.location.href='index.html'">Voltar</button>
    </div>
    <script src="assets/js/script.js"></script>
</body>
</html>
