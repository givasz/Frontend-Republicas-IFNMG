<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repúblicas IFNMG</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
    <header>
        <h1 class="bungee-spice-regular">Repúblicas IFNMG</h1>
        <nav>
            <button id="btn-add-republica">Anunciar República</button>
            <button id="btn-login" onclick="window.location.href='login.html'">Login/Cadastro</button>
        </nav>
    </header>
    <main class="container">
        <aside class="filtros-container">
            <form id="form-filtros" class="filtros">
                <h2>Filtros</h2>

                <!-- Filtro de Bairro (simplificado) -->
                <label for="select-bairro">Bairro:</label>
                <select id="select-bairro">
                    <option value="">Todos os bairros</option>
                    <!-- Opções serão preenchidas via JavaScript -->
                </select>

                <!-- Filtro de Valor -->
                <label for="filtro-preco">Valor Máximo (R$):</label>
                <input type="number" id="filtro-preco" placeholder="Qualquer valor" min="0">

                <!-- Filtro de Vagas -->
                <label for="filtro-vagas">Vagas Mínimas:</label>
                <input type="number" id="filtro-vagas" placeholder="Qualquer quantidade" min="0">

                <!-- Botão de Filtrar -->
                <button type="button" id="btn-filtrar">Aplicar Filtros</button>
            </form>
        </aside>
        <section class="republicas-container" id="republicas-lista">
            <p>Carregando repúblicas disponíveis...</p>
        </section>
    </main>

    <script src="assets/js/script.js"></script>
</body>
